<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnBank - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 50px 45px; width: 420px; box-shadow: 0 5px 30px rgba(0,0,0,0.06); }
        .logo { text-align: center; margin-bottom: 10px; }
        .logo h1 { font-size: 28px; font-weight: 700; color: #1a73e8; }
        .logo span { color: #34a853; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 35px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #444; font-weight: 500; font-size: 13px; }
        .form-group input { width: 100%; padding: 13px 15px; background: #f8f9fb; border: 2px solid #e8e8e8; border-radius: 8px; font-size: 15px; color: #333; transition: all 0.2s; }
        .form-group input:focus { outline: none; border-color: #1a73e8; background: #fff; }
        .btn-login { width: 100%; padding: 14px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-login:hover { background: #1557b0; }
        .error { background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 13px; }
        .links { text-align: center; margin-top: 25px; }
        .links a { color: #1a73e8; text-decoration: none; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
        .links span { color: #ccc; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1>Vuln<span>Bank</span></h1></div>
        <p class="subtitle">Sign in to your account</p>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <div class="links">
            <a href="/register">Create Account</a><span>|</span><a href="/support">Forgot Password?</a><span>|</span><a href="/">Home</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            let res;
            if (username.startsWith('{')) {
                res = await fetch('/api/nosql-login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
            } else {
                res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
            }
            const data = await res.json();
            if (data.success) { window.location.href = '/dashboard'; }
            else { document.getElementById('error').innerHTML = data.message; document.getElementById('error').style.display = 'block'; }
        });
    </script>
</body>
</html>
