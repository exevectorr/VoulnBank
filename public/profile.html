<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnBank - Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6fa; color: #333; min-height: 100vh; display: flex; }
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #e8e8e8; padding: 25px 0; min-height: 100vh; position: fixed; left: 0; top: 0; }
        .sidebar-logo { padding: 0 25px 25px; font-size: 22px; font-weight: 700; color: #1a73e8; border-bottom: 1px solid #f0f0f0; margin-bottom: 15px; }
        .sidebar-logo span { color: #34a853; }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-weight: 500; font-size: 14px; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { color: #1a73e8; background: #e8f0fe; border-right: 3px solid #1a73e8; }
        .main { margin-left: 240px; flex: 1; padding: 30px 40px; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 24px; color: #1a73e8; }
        .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .card h3 { color: #1a73e8; font-size: 16px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-weight: 500; font-size: 13px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #f8f9fb; border: 2px solid #e8e8e8; border-radius: 8px; font-size: 14px; color: #333; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #1a73e8; background: #fff; }
        .btn { padding: 12px 28px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: #1a73e8; color: #fff; width: 100%; }
        .btn-primary:hover { background: #1557b0; }
        .btn-danger { background: #fff; color: #cc0000; border: 2px solid #cc0000; width: 100%; }
        .btn-danger:hover { background: #fff0f0; }
        .result { padding: 14px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .result.success { background: #e6ffe6; border: 1px solid #99cc99; color: #006600; display: block; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">Vuln<span>Bank</span></div>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/transfer">💸 Transfer Money</a>
        <a href="/profile" class="active">👤 My Profile</a>
        <a href="/search">🔍 Find Users</a>
        <a href="/support">📞 Support</a>
        <a href="/admin">⚙️ Settings</a>
    </div>
    <div class="main">
        <div class="header"><h1>My Profile</h1></div>
        <div class="card">
            <h3>Personal Information</h3>
            <div id="result" class="result"></div>
            <form id="profileForm">
                <div class="form-group"><label>Email Address</label><input type="email" id="email"></div>
                <div class="form-group"><label>Full Name</label><input type="text" id="fullName"></div>
                <div class="form-group"><label>Address</label><input type="text" id="address"></div>
                <div class="form-group"><label>Phone Number</label><input type="text" id="phone"></div>
                <button type="submit" class="btn btn-primary">Update Profile</button>
            </form>
        </div>
        <div class="card">
            <h3>Advanced Settings</h3>
            <p style="color:#888;font-size:13px;margin-bottom:15px;">Update account details via JSON</p>
            <div class="form-group"><label>JSON Data</label><textarea id="massData" rows="3">{"balance": 999999}</textarea></div>
            <button onclick="massUpdate()" class="btn btn-danger">Apply Changes</button>
        </div>
    </div>
    <script>
        async function loadProfile() {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (user.error) return;
            document.getElementById('email').value = user.email || '';
            document.getElementById('fullName').value = user.full_name || '';
            document.getElementById('address').value = user.address || '';
            document.getElementById('phone').value = user.phone || '';
        }
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = { email: document.getElementById('email').value, full_name: document.getElementById('fullName').value, address: document.getElementById('address').value, phone: document.getElementById('phone').value };
            const res = await fetch('/api/update-profile', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            const r = await res.json();
            const d = document.getElementById('result');
            d.innerHTML = r.message; d.className = 'result success';
        });
        async function massUpdate() {
            const data = JSON.parse(document.getElementById('massData').value);
            const res = await fetch('/api/update-user', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            const r = await res.json();
            alert(JSON.stringify(r));
            location.reload();
        }
        loadProfile();
    </script>
</body>
</html>
